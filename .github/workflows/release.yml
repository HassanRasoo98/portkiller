name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.1). Builds from this branch/ref and attaches installers to that release tag.'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            host: macos-latest
          - platform: windows
            host: windows-latest
          - platform: linux
            host: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        env:
          # Empty CSC_LINK breaks electron-builder ("not a file"). Skip signing in CI
          # unless real Apple cert secrets are configured later.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: npx electron-builder --win --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portkiller-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Publish even if one platform failed, as long as at least one artifact exists
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Collect release files
        id: files
        shell: bash
        run: |
          mkdir -p upload
          find dist-artifacts -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.yml' -o -name '*.blockmap' \) \
            -exec cp -v {} upload/ \;
          count="$(find upload -type f | wc -l | tr -d ' ')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count release files:"
          ls -lah upload || true
          if [[ "$count" == "0" ]]; then
            echo "No installer artifacts were produced."
            exit 1
          fi

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: PortKiller ${{ steps.tag.outputs.name }}
          draft: false
          generate_release_notes: true
          files: upload/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
